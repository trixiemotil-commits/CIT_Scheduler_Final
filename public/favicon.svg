<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#1b4332"/>

  <!-- Calendar body -->
  <rect x="76" y="130" width="360" height="300" rx="28" fill="white" fill-opacity="0.13"/>

  <!-- Calendar header bar -->
  <rect x="76" y="130" width="360" height="88" rx="28" fill="white" fill-opacity="0.22"/>
  <rect x="76" y="190" width="360" height="28" fill="white" fill-opacity="0.22"/>

  <!-- Calendar pin left -->
  <rect x="160" y="96" width="26" height="60" rx="13" fill="#52b788"/>
  <!-- Calendar pin right -->
  <rect x="326" y="96" width="26" height="60" rx="13" fill="#52b788"/>

  <!-- Grid dots -->
  <circle cx="150" cy="290" r="14" fill="white" fill-opacity="0.5"/>
  <circle cx="218" cy="290" r="14" fill="white" fill-opacity="0.5"/>
  <circle cx="286" cy="290" r="14" fill="white" fill-opacity="0.5"/>
  <circle cx="354" cy="290" r="14" fill="white" fill-opacity="0.5"/>
  <circle cx="150" cy="360" r="14" fill="white" fill-opacity="0.5"/>
  <circle cx="218" cy="360" r="14" fill="#52b788"/>
  <circle cx="286" cy="360" r="14" fill="white" fill-opacity="0.5"/>
  <circle cx="354" cy="360" r="14" fill="white" fill-opacity="0.5"/>

  <!-- CIT text -->
  <text x="256" y="192" font-family="Arial Black,Arial,sans-serif" font-size="62" font-weight="900" fill="white" text-anchor="middle" letter-spacing="6">CIT</text>
</svg>
